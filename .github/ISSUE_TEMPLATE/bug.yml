name: Bug report
description: Something doesn't work as documented
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Security issues: email security@waapi.link instead.
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: v1.0.0 or abc1234
    validations:
      required: true
  - type: dropdown
    id: deploy
    attributes:
      label: Deployment
      options: [Docker Compose, Bare Docker, Source, Other]
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      placeholder: Describe the actual behaviour and what you expected.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Gateway logs (redact secrets!)
      render: shell
