name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: Go build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - run: go vet ./...
      - run: go test -race ./...
      - run: go build ./...

  dashboard:
    name: Dashboard build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npx tsc --noEmit
      - run: npm run build

# Image building lives in release.yml (Publish image) — it builds the
# multi-arch image once, with layer caching, and pushes to GHCR. CI used to
# duplicate that here without a push, which compiled arm64 CGO under QEMU
# emulation and routinely hit the 6h job timeout. Removed.
